name: Build JSON from CSV

on:
  push:
    branches: [main]
    paths:
      - "climbing_centers.csv"
      - "scripts/csv_to_json.py"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-json-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate JSON (fails on invalid data)
        run: python scripts/csv_to_json.py

      - name: Commit regenerated JSON if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: regenerate climbing_centers.json [skip ci]"
          file_pattern: climbing_centers.json
