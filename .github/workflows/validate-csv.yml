name: Validate CSV

on:
  pull_request:
    paths:
      - "climbing_centers.csv"
      - "scripts/csv_to_json.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate (does not commit)
        run: python scripts/csv_to_json.py
